site_name: MindStudio GitHub Docs
site_description: MindStudio tools documentation collection
site_url: https://mindstudio-docs-master.readthedocs.io/
repo_url: https://github.com/mindstudio-docs/master
repo_name: mindstudio-docs/master
edit_uri: edit/master/

docs_dir: .
site_dir: ../site
theme:
  name: readthedocs
  navigation_depth: 10

use_directory_urls: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/readthedocs-search.js

plugins:
  - search
  - same-dir

hooks:
  - hooks/nav_tree.py

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore
    anchors: ignore
    absolute_links: ignore
    unrecognized_links: ignore

# nav 由 hooks/nav_tree.py 在构建时动态生成

exclude_docs: |
  .git/
  .devin/
  .idea/
  .venv/
  .mkdocs*/
  .readthedocs.yaml
  mkdocs.yml
  requirements.txt
  site/
